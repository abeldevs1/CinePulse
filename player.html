<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePulse | Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://img.icons8.com/ios-filled/50/ff2d55/clapperboard.png">

    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { sans: ['Outfit', 'sans-serif'] }, colors: { pulse: '#ff2d55', dark: '#020408' } }
            }
        }
    </script>
    <style>
        body { background-color: #020408; color: #f3f4f6; overflow-x: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(10, 12, 18, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Preloader */
        #preloader { transition: opacity 0.5s ease; }
        .spinner { border: 4px solid rgba(255,45,85,0.2); border-top-color: #ff2d55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Iframe Protection & Loading */
        #iframeContainer { position: relative; background: #000; }
        .iframe-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; }
        #neuralIframe { position: relative; z-index: 10; background: transparent; }
    </style>
</head>
<body class="antialiased selection:bg-pulse selection:text-white pb-20">

    <div id="preloader" class="fixed inset-0 z-[9999] bg-[#020408] flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <div class="text-[10px] font-black tracking-[0.3em] uppercase text-gray-500">Loading Player</div>
    </div>

    <header class="fixed top-0 w-full z-[100] glass-nav px-4 md:px-8 py-4 flex items-center justify-between gap-4 shadow-xl">
        <div class="flex items-center gap-3 md:gap-6">
            <button onclick="goBackToModal()" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-pulse transition-all border border-white/10" title="Back to Details">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button onclick="window.location.href='index.html'" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-pulse transition-all border border-white/10 hidden sm:flex" title="Go Home">
                <i class="fas fa-home"></i>
            </button>
            <div class="font-black italic text-xl hidden md:block">CINE<span class="text-pulse">PULSE</span></div>
        </div>
        
        <div class="relative flex-1 max-w-md z-[101]">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="playerSearch" autocomplete="off" placeholder="Search movies or shows..." class="w-full bg-dark/50 border border-white/10 py-3 pl-12 pr-4 rounded-full text-[12px] font-bold text-white outline-none focus:border-pulse transition-all">
            
            <div id="playerSearchDropdown" class="absolute top-full left-0 right-0 mt-2 bg-[#0a0c12]/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl overflow-hidden hidden flex-col max-h-[400px] overflow-y-auto hide-scroll">
                </div>
        </div>
    </header>

    <div id="backdropSection" class="relative w-full pt-28 pb-12 px-4 flex flex-col items-center bg-cover bg-center min-h-[60vh] md:min-h-[80vh] shadow-[0_20px_50px_rgba(0,0,0,0.8)] border-b border-white/5" style="background-image: url('https://via.placeholder.com/1920x1080/020408/020408');">
        <div class="absolute inset-0 bg-dark/80 backdrop-blur-md"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-dark to-transparent"></div>

        <div class="relative z-20 text-center mb-6 max-w-4xl px-4">
            <h1 id="headerTitle" class="text-2xl md:text-5xl font-black italic uppercase tracking-tighter text-white drop-shadow-lg line-clamp-1">Loading...</h1>
            <p id="headerSubtitle" class="text-[10px] md:text-xs text-pulse uppercase tracking-[0.3em] font-bold mt-2"></p>
        </div>

        <div id="iframeContainer" class="relative z-20 w-full max-w-6xl aspect-video rounded-2xl md:rounded-3xl overflow-hidden border border-white/10 shadow-[0_0_40px_rgba(0,0,0,0.8)]">
            <div class="iframe-loader spinner"></div>
            <iframe 
    id="neuralIframe" 
    class="w-full h-full border-none absolute inset-0" 
    allowfullscreen="true" 
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-popups allow-popups-to-escape-sandbox"
    referrerpolicy="origin">
</iframe>

</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 md:px-8 -mt-6 relative z-30 space-y-8">

        <div id="animeControls" class="hidden mb-6 pb-4 border-b border-white/10 flex items-center justify-between">
            <h4 class="text-[10px] font-black uppercase text-[#a855f7] tracking-widest"><i class="fas fa-language mr-2"></i> Audio Format</h4>
            <div class="flex bg-dark border border-white/10 rounded-lg p-1">
                <button id="btnSub" onclick="setAudioMode('sub')" class="px-4 py-1.5 rounded-md text-[10px] font-black uppercase transition-all bg-[#a855f7] text-white">Sub</button>
                <button id="btnDub" onclick="setAudioMode('dub')" class="px-4 py-1.5 rounded-md text-[10px] font-black uppercase transition-all text-gray-500 hover:text-white">Dub</button>
            </div>
        </div>
        
        <div class="bg-white/5 border border-white/10 rounded-2xl p-4 md:p-6 backdrop-blur-xl shadow-xl">
            <h4 class="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-4"><i class="fas fa-server mr-2"></i> Select Server</h4>
            <div id="serverList" class="flex flex-wrap items-center gap-3"></div>
        </div>

        <div id="episodeSection" class="hidden bg-white/5 border border-white/10 rounded-2xl p-4 md:p-6 backdrop-blur-xl shadow-xl">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <h4 class="text-[10px] font-black uppercase text-[#3b82f6] tracking-widest"><i class="fas fa-list mr-2"></i> Episodes</h4>
                <select id="seasonSelect" onchange="renderEpisodes(this.value)" class="bg-dark border border-white/10 px-4 py-2 rounded-xl text-[10px] font-black uppercase outline-none focus:border-[#3b82f6] text-white cursor-pointer"></select>
            </div>
            <div id="episodeGrid" class="flex flex-wrap gap-2 max-h-[300px] overflow-y-auto hide-scroll pr-2"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 md:px-8 mt-16 grid grid-cols-1 lg:grid-cols-3 gap-12">
        
        <div class="lg:col-span-2 space-y-10">
            <div class="flex flex-col sm:flex-row gap-6 md:gap-8">
                <img id="detailPoster" class="w-32 sm:w-48 rounded-2xl shadow-xl border border-white/10 object-cover hidden sm:block">
                <div>
                    <div id="detailGenres" class="flex flex-wrap gap-2 mb-4"></div>
                    <p id="detailOverview" class="text-sm md:text-base text-gray-400 leading-relaxed font-light mb-6"></p>
                    <div id="detailProduction" class="text-[10px] uppercase font-bold tracking-widest text-gray-600 space-y-2 border-l-2 border-white/10 pl-4"></div>
                </div>
            </div>

            <div>
                <h4 class="text-[10px] font-black uppercase text-gray-500 tracking-[0.3em] mb-6 border-b border-white/5 pb-2">Cast & Crew</h4>
                <div id="detailCast" class="flex gap-4 overflow-x-auto hide-scroll pb-4"></div>
            </div>
        </div>

        <div class="space-y-6">
            <h4 class="text-[10px] font-black uppercase text-gray-500 tracking-[0.3em] mb-6 border-b border-white/5 pb-2">You May Also Like</h4>
            <div id="detailRecs" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
