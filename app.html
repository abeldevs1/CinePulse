<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePulse Elite PWA Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020408; overflow: hidden; }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .text-pulse { color: #ff2d55; }
        .bg-pulse { background: #ff2d55; }
        .shadow-pulse { box-shadow: 0 0 25px rgba(255,45,85,0.4); }
        
        /* Preloader */
        #preloader { transition: opacity 0.8s ease; }
        .loader { width: 100px; height: 100px; position: relative; perspective: 200px; margin: 0 auto 30px; }
        .dot {
            position: absolute; top: 50%; left: 50%;
            border-radius: 100px; border: 20px outset #ff2d55;
            transform-origin: 50% 50%;
            animation: dot1 1.5s cubic-bezier(.49,.06,.43,.85) infinite;
        }
        .dot:nth-child(1) { width: 80px; height: 80px; margin: -40px 0 0 -40px; }
        .dot:nth-child(2) { width: 100px; height: 100px; margin: -50px 0 0 -50px; border-width: 15px; border-color: #fff; animation-delay: 100ms; }
        @keyframes dot1 {
            0% { transform: rotateX(24deg) rotateY(20deg) rotateZ(0deg) translateZ(-25px); }
            50% { transform: rotateX(20deg) rotateY(20deg) rotateZ(50deg) translateZ(0px); border-color: #ff2d55; }
            100% { transform: rotateX(24deg) rotateY(20deg) rotateZ(0deg) translateZ(-25px); }
        }
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center min-h-screen p-6 relative">

    <div id="preloader" class="fixed inset-0 z-50 bg-[#020408] flex flex-col items-center justify-center">
        <div class="loader">
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="text-[10px] font-black uppercase tracking-[0.5em] text-pulse animate-pulse">Initializing Setup...</div>
    </div>

    <div class="absolute inset-0 z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-pulse/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#3b82f6]/10 rounded-full blur-[120px]"></div>
    </div>
    
    <div class="liquid-glass max-w-md w-full p-10 rounded-[40px] text-center relative z-10 border-t border-white/10">
        <div class="w-24 h-24 bg-pulse/10 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-pulse/20 shadow-pulse">
            <i class="fas fa-satellite-dish text-pulse text-4xl"></i>
        </div>
        
        <h1 class="text-3xl font-black italic uppercase tracking-tighter mb-2">CinePulse <span class="text-pulse">Elite</span></h1>
        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-10">Neural Interface Setup</p>

      <div id="setupContext" class="bg-[#0a0c12] border border-white/5 rounded-2xl p-6 mb-8 text-left space-y-4"></div>

        <div id="downloadUI" class="hidden w-full space-y-3 mb-6">
            <div class="flex justify-between text-[9px] font-black uppercase text-pulse tracking-widest">
                <span id="dlText">Establishing Neural Link...</span>
                <span id="dlPct">0%</span>
            </div>
            <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden border border-white/10">
                <div id="dlBar" class="h-full bg-pulse w-0 transition-all duration-300 shadow-[0_0_15px_rgba(255,45,85,0.8)]"></div>
            </div>
        </div>

        <button id="installAppBtn" class="hidden w-full py-4 rounded-2xl bg-pulse text-white text-[10px] font-black uppercase tracking-widest hover:scale-105 transition-all shadow-[0_10px_30px_rgba(255,45,85,0.3)] mb-6">
            <i class="fas fa-download mr-2"></i> Install App Engine
        </button>
        
        <a href="index.html" class="inline-block border-b border-white/20 pb-1 text-gray-500 text-[9px] uppercase font-black tracking-widest hover:text-white transition-all">
            Return to Library
        </a>
    </div>

    <script>
        // Remove preloader smoothly
        window.addEventListener('load', () => {
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                preloader.style.opacity = '0';
                setTimeout(() => preloader.style.display = 'none', 800);
            }, 1000);
        });

        let deferredPrompt;
        const btn = document.getElementById('installAppBtn');
        const contextBox = document.getElementById('setupContext');

        // Platform Detection
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        if (isStandalone) {
            contextBox.innerHTML = `
                <div class="flex items-center gap-4 text-[#22c55e]">
                    <i class="fas fa-check-circle text-2xl shadow-[0_0_15px_rgba(34,197,94,0.4)] rounded-full"></i>
                    <div>
                        <div class="text-[10px] font-black uppercase tracking-widest">System Active</div>
                        <div class="text-[9px] text-gray-500 uppercase mt-1">CinePulse is running natively.</div>
                    </div>
                </div>
            `;
        } else if (isIOS) {
            contextBox.innerHTML = `
                <h3 class="text-[10px] text-pulse font-black uppercase tracking-[0.2em] mb-3 border-b border-white/5 pb-2">iOS Instructions</h3>
                <ul class="text-[11px] text-gray-400 space-y-4 font-medium">
                    <li class="flex items-center gap-3"><span class="w-8 h-8 bg-white/5 border border-white/10 rounded-lg flex items-center justify-center text-pulse"><i class="fas fa-share-square"></i></span> Tap the <b>Share</b> icon at the bottom.</li>
                    <li class="flex items-center gap-3"><span class="w-8 h-8 bg-white/5 border border-white/10 rounded-lg flex items-center justify-center text-white"><i class="fas fa-plus-square"></i></span> Scroll down and tap <b>"Add to Home Screen"</b>.</li>
                </ul>
            `;
        } else {
            contextBox.innerHTML = `
                <div class="text-center py-4">
                    <i class="fas fa-spinner fa-spin text-pulse text-2xl mb-3"></i>
                    <p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Scanning device compatibility...</p>
                </div>
            `;
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            btn.classList.remove('hidden');
            contextBox.innerHTML = `
                <div class="flex items-start gap-4 text-white">
                    <i class="fas fa-bolt text-pulse text-xl mt-1 drop-shadow-[0_0_10px_rgba(255,45,85,0.8)]"></i>
                    <div>
                        <div class="text-[10px] font-black uppercase tracking-widest">Ready for Deployment</div>
                        <div class="text-[10px] text-gray-400 leading-relaxed mt-2">Click below to install CinePulse natively on your device for full-screen access and background syncing.</div>
                    </div>
                </div>
            `;
        });

        // The Simulated Download Engine
        btn.addEventListener('click', () => {
            if (!deferredPrompt) return;
            
            btn.classList.add('hidden');
            const dlUI = document.getElementById('downloadUI');
            dlUI.classList.remove('hidden');
            
            const bar = document.getElementById('dlBar');
            const pct = document.getElementById('dlPct');
            const txt = document.getElementById('dlText');
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 12) + 4; // Random jumps
                if (progress >= 100) progress = 100;
                
                bar.style.width = progress + '%';
                pct.innerText = progress + '%';
                
                if (progress > 30) txt.innerText = "Downloading Core Assets...";
                if (progress > 60) txt.innerText = "Injecting Source Engine...";
                if (progress > 85) txt.innerText = "Finalizing Neural Link...";
                
                if (progress >= 100) {
                    clearInterval(interval);
                    txt.innerText = "Deployment Ready.";
                    txt.className = "text-[#22c55e]";
                    bar.className = "h-full bg-[#22c55e] w-full shadow-[0_0_15px_rgba(34,197,94,0.8)]";
                    pct.className = "text-[#22c55e]";
                    
                    setTimeout(async () => {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            dlUI.classList.add('hidden');
                            contextBox.innerHTML = `<div class="text-center text-[#22c55e] text-[10px] font-black uppercase tracking-widest py-4"><i class="fas fa-check-circle mb-3 text-4xl shadow-[0_0_20px_rgba(34,197,94,0.4)] rounded-full"></i><br>Installation Successful</div>`;
                        } else {
                            // If they cancel the OS prompt, reset UI
                            btn.classList.remove('hidden');
                            dlUI.classList.add('hidden');
                            bar.style.width = '0%';
                            txt.innerText = "Establishing Neural Link...";
                            txt.className = "text-pulse";
                            bar.className = "h-full bg-pulse w-0 transition-all duration-300 shadow-[0_0_15px_rgba(255,45,85,0.8)]";
                            pct.className = "text-pulse";
                        }
                        deferredPrompt = null;
                    }, 600);
                }
            }, 300); // Ticks every 300ms
        });
    </script>
</body>
</html>
