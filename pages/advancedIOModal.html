<div id="advancedIOModal" onclick="closeAdvancedIO()"
        class="fixed inset-0 z-[600] hidden flex items-center justify-center bg-black/80 backdrop-blur-xl p-4 transition-all"
        style="position: fixed !important;">
        <div onclick="event.stopPropagation()"
            class="relative w-full max-w-3xl bg-[#0a0c12] border border-white/10 rounded-[40px] shadow-2xl flex flex-col p-6 md:p-10 animate-in fade-in zoom-in duration-300 max-h-[90vh] overflow-hidden">
            <button onclick="closeAdvancedIO()"
                class="absolute top-6 right-6 w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-gray-500 hover:text-white hover:bg-pulse transition-all">
                <i class="fas fa-times"></i>
            </button>

            <h3 id="ioModalTitle" class="text-3xl font-black italic uppercase text-white mb-2">Neural Link</h3>
            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-8">Advanced Protocol
                Configuration</p>

            <div id="exportConfig" class="space-y-6 hidden">
                <h4 class="text-[10px] font-black uppercase text-pulse tracking-[0.2em] border-b border-white/5 pb-2">
                    Select Datasets to Export</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-pulse/50 transition-all"><input
                            type="checkbox" id="expLibrary" checked class="w-4 h-4 accent-pulse"><span
                            class="text-[10px] font-black text-white uppercase">Main Library</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-pulse/50 transition-all"><input
                            type="checkbox" id="expSagas" checked class="w-4 h-4 accent-pulse"><span
                            class="text-[10px] font-black text-white uppercase">Universe Forge</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-pulse/50 transition-all"><input
                            type="checkbox" id="expSources" checked class="w-4 h-4 accent-pulse"><span
                            class="text-[10px] font-black text-white uppercase">Source Engine</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-pulse/50 transition-all"><input
                            type="checkbox" id="expRadar" checked class="w-4 h-4 accent-pulse"><span
                            class="text-[10px] font-black text-white uppercase">Neural Radar</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-pulse/50 transition-all md:col-span-2"><input
                            type="checkbox" id="expPrefs" checked class="w-4 h-4 accent-pulse"><span
                            class="text-[10px] font-black text-white uppercase">App Settings & Prefs</span></label>
                </div>
                <button onclick="executeAdvancedExport()"
                    class="w-full py-4 bg-pulse text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-[1.02] transition-transform shadow-lg shadow-pulse/30 mt-4">Generate
                    Custom Backup</button>
            </div>

            <div id="importConfig" class="space-y-6 hidden">
                <h4
                    class="text-[10px] font-black uppercase text-[#22c55e] tracking-[0.2em] border-b border-white/5 pb-2">
                    Select Datasets to Import</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-[#22c55e]/50 transition-all"><input
                            type="checkbox" id="impLibrary" checked class="w-4 h-4 accent-[#22c55e]"><span
                            class="text-[10px] font-black text-white uppercase">Main Library</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-[#22c55e]/50 transition-all"><input
                            type="checkbox" id="impSagas" checked class="w-4 h-4 accent-[#22c55e]"><span
                            class="text-[10px] font-black text-white uppercase">Universe Forge</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-[#22c55e]/50 transition-all"><input
                            type="checkbox" id="impSources" checked class="w-4 h-4 accent-[#22c55e]"><span
                            class="text-[10px] font-black text-white uppercase">Source Engine</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-[#22c55e]/50 transition-all"><input
                            type="checkbox" id="impRadar" checked class="w-4 h-4 accent-[#22c55e]"><span
                            class="text-[10px] font-black text-white uppercase">Neural Radar</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer hover:border-[#22c55e]/50 transition-all md:col-span-2"><input
                            type="checkbox" id="impPrefs" checked class="w-4 h-4 accent-[#22c55e]"><span
                            class="text-[10px] font-black text-white uppercase">App Settings & Prefs</span></label>
                </div>

                <h4
                    class="text-[10px] font-black uppercase text-[#22c55e] tracking-[0.2em] border-b border-white/5 pb-2">
                    Conflict Strategy</h4>
                <div class="space-y-3 mb-4">
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-[#22c55e]/30 rounded-2xl cursor-pointer transition-all"><input
                            type="radio" name="importStrat" value="merge" checked class="w-4 h-4 accent-[#22c55e]"><span
                            class="text-[10px] font-black text-[#22c55e] uppercase">Smart Merge</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer transition-all"><input
                            type="radio" name="importStrat" value="overwrite" class="w-4 h-4 accent-pulse"><span
                            class="text-[10px] font-black text-white uppercase">Total Overwrite</span></label>
                    <label
                        class="flex items-center gap-4 p-3 bg-white/5 border border-white/10 rounded-2xl cursor-pointer transition-all"><input
                            type="radio" name="importStrat" value="skip" class="w-4 h-4 accent-gray-400"><span
                            class="text-[10px] font-black text-white uppercase">Skip Duplicates</span></label>
                </div>

                <input type="file" id="advImportFile" accept=".json" class="hidden"
                    onchange="executeAdvancedImport(event)">
                <button onclick="document.getElementById('advImportFile').click()"
                    class="w-full py-4 bg-[#22c55e] text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:scale-[1.02] transition-transform shadow-lg shadow-[#22c55e]/30">Select
                    File & Begin Sync</button>
            </div>
        </div>
    </div>
