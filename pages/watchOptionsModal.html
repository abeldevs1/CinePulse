<div id="watchOptionsModal"
    class="fixed inset-0 z-[800] hidden bg-[#020408]/90 backdrop-blur-md flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div
            class="bg-[#0a0c12] border border-white/10 rounded-3xl w-full max-w-md p-6 flex flex-col gap-6 transform scale-95 transition-transform duration-300 shadow-2xl">

            <div class="flex justify-between items-start">
                <div>
                    <h3 id="watchOptionsTitle" class="text-xl font-bold text-white line-clamp-1">Select Source</h3>
                    <p class="text-sm text-gray-400 mt-1">Choose how you want to watch</p>
                </div>
                <button onclick="closeWatchOptions()"
                    class="w-8 h-8 bg-white/5 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="flex flex-col gap-3">
                <button id="btnInternalPlayer"
                    class="w-full bg-[#ff2d55] text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-[#ff4566] transition-colors shadow-lg shadow-[#ff2d55]/20">
                    <i class="fas fa-play"></i> Watch Here
                </button>
            </div>

            <div class="border-t border-white/10 pt-5">
                <p class="text-xs text-gray-400 mb-2 uppercase tracking-wider font-bold">Alternative Sources</p>
                <p class="text-[11px] text-gray-500 mb-4 leading-relaxed">If the built-in player is buffering or
                    unavailable, you can check these official databases to find where it is streaming legally:</p>

                <div class="flex flex-col gap-2">
                    <a id="linkJustWatch" target="_blank"
                        class="w-full bg-white/5 border border-white/10 text-white py-2.5 rounded-xl flex items-center justify-center gap-2 hover:bg-white/10 transition-colors text-sm font-medium">
                        <i class="fas fa-search"></i> Find on JustWatch
                    </a>
                    <a id="linkTMDB" target="_blank"
                        class="w-full bg-white/5 border border-white/10 text-white py-2.5 rounded-xl flex items-center justify-center gap-2 hover:bg-white/10 transition-colors text-sm font-medium">
                        <i class="fas fa-info-circle"></i> View TMDB Details
                    </a>
                </div>
            </div>
        </div>
    </div>
