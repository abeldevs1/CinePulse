<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'></head><body>
<div id="view-mylist" class="page-view hidden p-6 lg:p-24 pt-24 lg:pt-32 relative">
            <!-- Page Info Button: Recalibrated for zero-overlap -->
            <button onclick="openPageInfo('mylist')"
                class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
                <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
            </button>

            <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-8 mb-16">
                <div>
                    <h2
                        class="text-4xl md:text-6xl lg:text-7xl font-black italic uppercase tracking-tighter liquid-glass mb-2">
                        My Library</h2>
                    <p class="text-[10px] text-pulse uppercase tracking-[0.3em] font-bold">Synchronized Neural Records
                    </p>
                </div>

                <div class="library-action-bar flex flex-wrap items-center gap-2 w-full xl:w-auto overflow-visible">

                    <div class="local-search-wrapper w-full md:w-48 xl:w-64 mobile-full-search shrink-0">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/40 text-[10px]"></i>
                        <input type="text" id="listSearchInput" oninput="handleLocalSearch('list', this.value)"
                            placeholder="Search Library..."
                            class="local-search-input w-full py-3 pl-10 pr-4 rounded-xl text-[10px] font-black uppercase outline-none tracking-widest placeholder:text-white/30">
                    </div>

                    <div class="w-px h-6 bg-white/10 mx-2 hidden md:block"></div>

                    <button onclick="toggleSelectMode()" id="btnSelectMode"
                        class="lib-btn shrink-0 text-[#3b82f6] hover:bg-[#3b82f6]/10" title="Multi-Select">
                        <i class="fas fa-check-square"></i> <span>Select</span>
                    </button>

                    <div class="w-px h-6 bg-white/10 mx-2 hidden md:block"></div>

                    <button onclick="openAdvancedIO('import')" class="lib-btn shrink-0" title="Advanced Import">
                        <i class="fas fa-file-import"></i> <span>Import</span>
                    </button>

                    <button onclick="openTemporalArchive()"
                        class="lib-btn shrink-0 text-[#a855f7] hover:bg-[#a855f7]/10" title="Version Control Timeline">
                        <i class="fas fa-code-branch"></i> <span>Timeline</span>
                    </button>

                    <div class="relative group">
                        <button onclick="exportData()" class="lib-btn shrink-0" title="Quick Export">
                            <i class="fas fa-file-export"></i> <span>Quick Export</span>
                        </button>
                        <div class="absolute top-full left-0 pt-2 w-48 hidden group-hover:block z-50">
                            <div class="bg-[#0a0c12] border border-white/10 rounded-xl shadow-2xl overflow-hidden">
                                <button onclick="openAdvancedIO('export')"
                                    class="w-full text-left px-4 py-3 text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                                    <i class="fas fa-sliders-h mr-2"></i> Advanced Export
                                </button>

                            </div>
                        </div>
                    </div>
                    <div class="w-px h-6 bg-white/10 mx-2 hidden md:block"></div>

                    <button onclick="shareWatchlist()"
                        class="lib-btn shrink-0 text-[#22c55e] hover:bg-[#22c55e]/10 border-[#22c55e]/30 shadow-lg shadow-[#22c55e]/10"
                        title="Share Watchlist">
                        <i class="fas fa-share-nodes"></i> <span>Share Link</span>
                    </button>
                    <div class="w-px h-6 bg-white/10 mx-2 hidden md:block"></div>

                    <button onclick="openFactoryResetModal()" class="lib-btn danger shrink-0" title="Factory Reset">
                        <i class="fas fa-radiation"></i> <span>Reset All</span>
                    </button>

                    <div class="w-px h-6 bg-white/10 mx-2 hidden md:block"></div>

                    <button id="viewToggle" onclick="toggleListView()" class="lib-btn shrink-0">
                        <i class="fas fa-list"></i>
                    </button>

                    <button onclick="openPicker()" class="lib-btn primary shrink-0 ml-auto xl:ml-2">
                        <i class="fas fa-dice"></i> <span>Random Picker</span>
                    </button>

                    <select id="listSortDrop" onchange="state.listSort = this.value; renderList()"
                        class="bg-dark border border-white/10 p-3 rounded-xl text-[10px] font-black uppercase outline-none focus:border-pulse text-gray-400 shrink-0">
                        <option value="newest">Added: Newest</option>
                        <option value="oldest">Added: Oldest</option>
                    </select>
                </div>

            </div>
            <div class="mb-10 space-y-4">
                <div class="flex flex-wrap md:flex-nowrap gap-2 md:gap-3 items-center w-full" id="listTypeFilters">
                    <button onclick="toggleListFilter('type', 'all')" id="lType-all"
                        class="l-type-btn px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest bg-pulse text-white shadow-lg shadow-pulse/20 shrink-0 transition-all">All</button>
                    <button onclick="toggleListFilter('type', 'movie')" id="lType-movie"
                        class="l-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Movies</button>
                    <button onclick="toggleListFilter('type', 'tv')" id="lType-tv"
                        class="l-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Series</button>
                    <button onclick="toggleListFilter('type', 'anime')" id="lType-anime"
                        class="l-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Anime</button>
                    <button onclick="toggleListFilter('type', 'kdrama')" id="lType-kdrama"
                        class="l-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">K-Drama</button>
                    <button onclick="toggleListFilter('type', 'turkish')" id="lType-turkish"
                        class="l-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Turkish</button>
                    <button onclick="toggleListFilter('type', 'asian')" id="lType-asian"
                        class="l-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Asian</button>

                    <div class="w-px h-6 bg-white/10 mx-1 shrink-0 hidden md:block"></div>

                    <button onclick="toggleGenreVisibility('listGenreContainer', this)"
                        class="px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all flex items-center gap-2">
                        <i class="fas fa-tags"></i> Genres
                    </button>
                    <button onclick="resetListFilters()"
                        class="px-6 py-2 rounded-full bg-pulse/10 text-pulse border border-pulse/20 text-[10px] font-black uppercase hover:bg-pulse hover:text-white shrink-0 transition-all flex items-center gap-2">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
                <div id="listGenreContainer"
                    class="hidden flex flex-wrap gap-2 md:gap-3 mt-4 w-full animate-in fade-in duration-300"></div>


            </div>
            <div id="listContainer" class="space-y-16"></div>
        </div></body></html>
