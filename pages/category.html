<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'></head><body>
<div id="view-category" class="page-view hidden p-10 lg:p-24 pt-32 relative">
            <!-- Page Info Button: Recalibrated for zero-overlap -->
            <button onclick="openPageInfo('search')"
                class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
                <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
            </button>


            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-20">
                <div class="flex items-center gap-6">
                    <button onclick="navigate('home')"
                        class="w-12 h-12 bg-white/5 rounded-full border border-white/10 flex items-center justify-center hover:bg-pulse transition-all group">
                        <i class="fas fa-arrow-left text-gray-500 group-hover:text-white transition-all"></i>
                    </button>
                    <h2 id="catTitle"
                        class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter text-white">Category
                    </h2>
                </div>
                <div class="mt-4 relative max-w-md">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-xs"></i>
                    <input type="text" id="catSearchInput" oninput="filterCategoryGrid(this.value)"
                        placeholder="Search this category..."
                        class="w-full bg-dark/50 border border-white/10 py-3 pl-10 pr-4 rounded-xl text-[10px] font-black uppercase tracking-widest text-white outline-none focus:border-pulse transition-all">
                </div>

                <div class="flex bg-[#0a0c12] p-1.5 rounded-2xl border border-white/10 shadow-2xl">
                    <button id="btnTrending" onclick="setCategorySort('trending')"
                        class="px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-pulse text-white shadow-lg shadow-pulse/20">Trending</button>
                    <button id="btnTopRated" onclick="setCategorySort('top')"
                        class="px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-white">Top
                        Rated</button>
                </div>
            </div>

            <div id="categoryGrid"
                class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-8 relative min-h-[400px]">
            </div>

            <div class="mt-24 flex justify-center">
                <button id="catLoadMore" onclick="loadMoreCategory()"
                    class="bg-white/5 border border-white/10 px-12 py-5 rounded-xl font-black text-[10px] uppercase tracking-widest hover:border-pulse hover:text-white transition-all text-gray-400">
                    Load More <i class="fas fa-chevron-down ml-3"></i>
                </button>
            </div>
        </div></body></html>
