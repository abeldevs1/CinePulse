<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'></head><body>
<div id="view-rhythmlab" class="page-view hidden p-6 md:p-10 lg:p-24 pt-24 lg:pt-32 relative">
            <!-- Page Info Button: Recalibrated for zero-overlap -->
            <button onclick="openPageInfo('rhythmlab')"
                class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
                <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
            </button>

            <div class="flex justify-between items-center mb-10 md:mb-16">
                <h2 class="text-4xl md:text-7xl font-black italic uppercase tracking-tighter">Your Collections</h2>
            </div>

            <div id="labCounters" class="grid grid-cols-2 md:grid-cols-5 gap-6 mb-10 md:mb-20"></div>

            <div class="mb-10 space-y-4">
                <div class="flex overflow-x-auto hide-scroll gap-2 md:gap-3 items-center w-full pb-4"
                    id="labTypeFilters">
                    <button onclick="toggleLabFilter('type', 'all')" id="labType-all"
                        class="lab-type-btn px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest bg-pulse text-white shadow-lg shadow-pulse/20 shrink-0 transition-all">All</button>
                    <button onclick="toggleLabFilter('type', 'movie')" id="labType-movie"
                        class="lab-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Movies</button>
                    <button onclick="toggleLabFilter('type', 'tv')" id="labType-tv"
                        class="lab-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Series</button>
                    <button onclick="toggleLabFilter('type', 'anime')" id="labType-anime"
                        class="lab-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Anime</button>
                    <button onclick="toggleLabFilter('type', 'kdrama')" id="labType-kdrama"
                        class="lab-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">K-Drama</button>
                    <button onclick="toggleLabFilter('type', 'turkish')" id="labType-turkish"
                        class="lab-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Turkish</button>
                    <button onclick="toggleLabFilter('type', 'asian')" id="labType-asian"
                        class="lab-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Asian</button>

                    <div class="w-px h-6 bg-white/10 mx-1 shrink-0 hidden md:block"></div>

                    <button onclick="toggleGenreVisibility('labGenreContainer', this)"
                        class="px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all flex items-center gap-2">
                        <i class="fas fa-tags"></i> Genres
                    </button>
                    <button onclick="resetLabFilters()"
                        class="px-6 py-2 rounded-full bg-pulse/10 text-pulse border border-pulse/20 text-[10px] font-black uppercase hover:bg-pulse hover:text-white shrink-0 transition-all flex items-center gap-2">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
                <div id="labGenreContainer"
                    class="hidden flex flex-wrap gap-2 md:gap-3 mt-4 w-full animate-in fade-in duration-300"></div>
            </div>


            <div class="flex flex-col lg:flex-row gap-4 mb-6">
                <div class="local-search-wrapper w-full lg:flex-1">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-white/40"></i>
                    <input type="text" id="labSearchInput" oninput="handleLocalSearch('lab', this.value)"
                        autocomplete="off" placeholder="Search Neural Records... "
                        class="local-search-input w-full h-full p-5 pl-12 rounded-2xl text-[10px] font-black uppercase outline-none tracking-widest placeholder:text-white/30">
                </div>

                <div class="flex gap-4">
                    <button onclick="toggleAdvancedLabFilters()"
                        class="lib-btn flex-1 lg:flex-none shrink-0 bg-white/5 p-5 rounded-2xl hover:bg-pulse transition-all border border-white/10 flex items-center justify-center group">
                        <i class="fas fa-sliders-h text-gray-400 group-hover:text-white transition-colors"></i>
                        <span class="ml-2 text-white text-[10px] uppercase font-black tracking-widest">Filters</span>
                    </button>
                    <button onclick="toggleSelectMode()"
                        class="lib-btn shrink-0 bg-white/5 p-5 rounded-2xl hover:bg-[#3b82f6]/20 hover:border-[#3b82f6]/50 transition-all border border-white/10 flex items-center justify-center text-[#3b82f6]"
                        title="Multi-Select">
                        <i class="fas fa-check-square"></i>
                    </button>
                    <button id="labViewToggle" onclick="toggleLabView()"
                        class="lib-btn shrink-0 bg-white/5 p-5 rounded-2xl hover:bg-pulse transition-all border border-white/10 flex items-center justify-center">
                        <i class="fas fa-list text-white"></i>
                    </button>
                    <div id="labCount"
                        class="bg-pulse flex items-center justify-center p-5 min-w-[60px] rounded-2xl font-black text-xl italic shadow-lg shadow-pulse/20">
                        0</div>
                    <select id="labSortDrop" onchange="state.labSort = this.value; runLab()"
                        class="bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black uppercase outline-none focus:border-pulse w-full">
                        <option value="newest">Added: Newest</option>
                        <option value="oldest">Added: Oldest</option>
                    </select>
                </div>

            </div>

            <div id="labAdvancedFilters"
                class="hidden grid grid-cols-2 lg:grid-cols-4 gap-4 p-6 mb-10 bg-[#0a0c12]/50 border border-white/10 rounded-3xl backdrop-blur-md animate-in fade-in zoom-in-95 duration-300">


                <select id="labStatus" onchange="runLab()"
                    class="bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black uppercase outline-none focus:border-pulse w-full">
                    <option value="all">Any Status</option>
                    <option value="Watching">Watching</option>
                    <option value="Ongoing">Ongoing</option>
                    <option value="Plan to Watch">Plan to Watch</option>
                    <option value="Finished">Finished</option>
                </select>
                <select id="labYear" onchange="runLab()"
                    class="bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black uppercase outline-none focus:border-pulse w-full">
                    <option value="all">Any Year</option>
                </select>
                <select id="labImdb" onchange="runLab()"
                    class="bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black uppercase outline-none focus:border-pulse w-full">
                    <option value="all">IMDb</option>
                    <option value="8.5">Masterpiece (8.5+)</option>
                    <option value="7">Good (7.0+)</option>
                </select>
                <select id="labPersonal" onchange="runLab()"
                    class="bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black uppercase outline-none focus:border-pulse w-full">
                    <option value="all">My Score</option>
                    <option value="5">Perfect (5★)</option>
                    <option value="3">Decent (3★+)</option>
                </select>

            </div>


            <div id="labGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div></body></html>
