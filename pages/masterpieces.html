<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'></head><body>
<div id="view-masterpieces" class="page-view hidden p-10 lg:p-24 pt-32 min-h-screen relative">
            <!-- Page Info Button: Recalibrated for zero-overlap -->
            <button onclick="openPageInfo('masterpieces')"
                class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
                <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
            </button>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-10 mb-12">
                <h2 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter liquid-glass">Masterpieces
                </h2>
                <div
                    class="flex bg-[#0a0c12] p-1.5 rounded-2xl border border-white/10 shadow-2xl overflow-x-auto hide-scroll">
                    <button onclick="setMpTab('crowned')" id="mpTab-crowned"
                        class="px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-pulse text-white shadow-lg shadow-pulse/20 whitespace-nowrap">👑
                        Crowned</button>
                    <button onclick="setMpTab('perfect')" id="mpTab-perfect"
                        class="px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-white whitespace-nowrap">★
                        Perfect Scores</button>
                    <button onclick="setMpTab('ranked')" id="mpTab-ranked"
                        class="px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-white whitespace-nowrap">🏆
                        Rankings</button>
                </div>
            </div>
            <div id="mpContainer" class="pb-20"></div>
        </div></body></html>
