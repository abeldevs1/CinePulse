<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'></head><body>
<div id="view-sync" class="page-view hidden p-6 md:p-10 lg:p-24 pt-24 lg:pt-32 min-h-screen relative">
            <!-- Page Info Button: Recalibrated for zero-overlap -->
            <button onclick="openPageInfo('sync')"
                class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
                <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
            </button>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
                <div>
                    <h2
                        class="text-4xl md:text-6xl lg:text-7xl font-black italic uppercase tracking-tighter liquid-glass mb-2">
                        For You</h2>
                    <p class="text-[10px] text-pulse uppercase tracking-[0.3em] font-bold">Neural Recommendations</p>
                </div>

                <div class="flex flex-wrap items-center gap-3 md:gap-4 w-full md:w-auto">
                    <button onclick="saveSyncBatch()" title="Save current neural batch"
                        class="flex-1 md:flex-none bg-white/5 border border-white/10 px-6 py-4 rounded-xl text-gray-400 hover:text-white transition-all flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest group shadow-lg">
                        <i class="fas fa-bookmark group-hover:scale-110 transition-transform"></i> Archive
                    </button>
                    <button onclick="loadSyncBatch()" title="Load last archived batch"
                        class="flex-1 md:flex-none bg-white/5 border border-white/10 px-6 py-4 rounded-xl text-gray-400 hover:text-white transition-all flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest group shadow-lg">
                        <i class="fas fa-history group-hover:scale-110 transition-transform"></i> History
                    </button>
                    <button onclick="toggleSafeMode()"
                        class="safe-mode-toggle flex-1 md:flex-none px-6 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white/5 border border-white/10 text-gray-500 hover:text-white flex items-center justify-center gap-2 shadow-lg">
                        <i class="fas fa-shield-alt text-lg"></i> <span class="safe-mode-text">Safe: ON</span>
                    </button>
                    <button onclick="renderSync()"
                        class="flex-1 md:flex-none bg-pulse/10 border border-pulse/30 px-6 py-4 rounded-xl text-pulse hover:bg-pulse hover:text-white transition-all flex items-center justify-center gap-3 text-[10px] font-black uppercase tracking-widest group shadow-lg">
                        <i class="fas fa-sync-alt group-hover:rotate-180 transition-transform duration-500"></i> Resync
                    </button>
                </div>
            </div>
            <div id="syncContainer" class="space-y-16 md:space-y-32"></div>
        </div></body></html>
