<div id="view-neurallink"
            class="page-view hidden p-6 md:p-10 lg:p-24 pt-24 lg:pt-32 relative min-h-screen flex flex-col items-center">
            <!-- Page Info Button: Recalibrated for zero-overlap -->
            <button onclick="openPageInfo('neurallink')"
                class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
                <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
            </button>


            <div
                class="absolute inset-0 z-0 overflow-hidden flex items-center justify-center opacity-20 pointer-events-none">
                <div
                    class="radar-circle w-[300px] h-[300px] md:w-[600px] md:h-[600px] rounded-full border border-pulse absolute">
                </div>
                <div
                    class="radar-circle w-[450px] h-[450px] md:w-[900px] md:h-[900px] rounded-full border border-pulse absolute animation-delay-1000">
                </div>
            </div>


            <div class="relative z-10 w-full max-w-5xl text-center mb-12">
                <h2 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter text-white mb-4">Neural
                    <span class="text-pulse">Link</span>
                </h2>
                <p class="text-[11px] text-gray-400 font-bold tracking-[0.2em] uppercase mb-6">Multi-Master P2P
                    Synchronization</p>

                <div
                    class="inline-flex items-center gap-4 bg-dark/80 backdrop-blur-md p-4 rounded-2xl border border-white/10 shadow-xl mb-6">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="neuralMasterToggle" class="sr-only peer"
                            onchange="toggleNeuralEngine()">
                        <div
                            class="w-14 h-7 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-[#3b82f6]">
                        </div>
                    </label>
                    <span id="neuralStateLabel"
                        class="text-[10px] font-black uppercase tracking-widest text-gray-500">Engine Offline</span>
                </div>
            </div>
            <div class="relative z-10 w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">

                <div
                    class="bg-[#0a0c12]/80 backdrop-blur-2xl p-8 rounded-[40px] border border-white/10 flex flex-col items-center text-center shadow-[0_20px_40px_rgba(0,0,0,0.5)]">
                    <div
                        class="w-16 h-16 rounded-full bg-pulse/10 text-pulse flex items-center justify-center text-2xl mb-6 shadow-[0_0_20px_rgba(255,45,85,0.2)]">
                        <i class="fas fa-satellite-dish animate-pulse"></i>
                    </div>
                    <h3 class="text-xl font-black uppercase tracking-widest mb-2 text-white">Primary Hub</h3>
                    <p class="text-xs text-gray-400 mb-8 leading-relaxed">Establish this device as the source of truth.
                    </p>

                    <div class="w-full mt-auto relative">
                        <input type="text" id="deviceNameInput" placeholder="Node Name (e.g., Rig-01)"
                            class="w-full bg-black/50 border border-white/10 rounded-2xl px-4 py-4 text-xs text-white placeholder-gray-600 outline-none focus:border-pulse mb-4 font-bold uppercase tracking-wider text-center">

                        <button onclick="document.getElementById('syncFilters').classList.toggle('hidden')"
                            class="text-[9px] font-black uppercase text-gray-500 hover:text-white transition-colors mb-4 flex items-center justify-center gap-2 w-full"><i
                                class="fas fa-sliders-h"></i> Toggle Payload Filters</button>
                        <div id="syncFilters"
                            class="hidden mb-4 bg-white/5 p-4 rounded-xl border border-white/10 text-left">
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                                <label
                                    class="flex items-center gap-2 text-[9px] text-white uppercase font-bold cursor-pointer"><input
                                        type="checkbox" class="sync-filter accent-pulse w-3 h-3" value="movie" checked>
                                    Movies</label>
                                <label
                                    class="flex items-center gap-2 text-[9px] text-white uppercase font-bold cursor-pointer"><input
                                        type="checkbox" class="sync-filter accent-pulse w-3 h-3" value="tv" checked>
                                    Series</label>
                                <label
                                    class="flex items-center gap-2 text-[9px] text-white uppercase font-bold cursor-pointer"><input
                                        type="checkbox" class="sync-filter accent-pulse w-3 h-3" value="anime" checked>
                                    Anime</label>
                                <label
                                    class="flex items-center gap-2 text-[9px] text-white uppercase font-bold cursor-pointer"><input
                                        type="checkbox" class="sync-filter accent-pulse w-3 h-3" value="kdrama" checked>
                                    K-Drama</label>
                                <label
                                    class="flex items-center gap-2 text-[9px] text-white uppercase font-bold cursor-pointer"><input
                                        type="checkbox" class="sync-filter accent-pulse w-3 h-3" value="turkish"
                                        checked> Turkish</label>
                                <label
                                    class="flex items-center gap-2 text-[9px] text-white uppercase font-bold cursor-pointer"><input
                                        type="checkbox" class="sync-filter accent-pulse w-3 h-3" value="asian" checked>
                                    Asian</label>
                            </div>
                        </div>

                        <button onclick="initNeuralHost()"
                            class="w-full bg-pulse text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:scale-105 transition-all shadow-[0_10px_20px_rgba(255,45,85,0.3)]">
                            Generate Sync Key
                        </button>
                    </div>

                    <div id="qrContainer" class="hidden mt-8 w-full flex flex-col items-center">
                        <div
                            class="relative inline-block p-4 bg-white rounded-[30px] shadow-[0_0_40px_rgba(255,45,85,0.5)] overflow-hidden">
                            <div
                                class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10">
                                <span class="text-pulse font-black italic tracking-tighter"
                                    style="font-size: 120px; line-height: 1; filter: drop-shadow(0 0 4px rgba(0,0,0,0.3));">C</span>
                            </div>
                            <div id="qrCanvas" class="relative z-10"></div>
                        </div>
                        <div id="hostStatusText"
                            class="mt-6 text-[10px] text-pulse font-black uppercase tracking-widest animate-pulse bg-pulse/10 border border-pulse/30 px-4 py-2 rounded-full">
                            Awaiting Connection...</div>
                    </div>
                </div>

                <div
                    class="bg-[#0a0c12]/80 backdrop-blur-2xl p-8 rounded-[40px] border border-white/10 flex flex-col items-center text-center shadow-[0_20px_40px_rgba(0,0,0,0.5)]">
                    <div
                        class="w-16 h-16 rounded-full bg-[#3b82f6]/10 text-[#3b82f6] flex items-center justify-center text-2xl mb-6 shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                        <i class="fas fa-network-wired"></i>
                    </div>
                    <h3 class="text-xl font-black uppercase tracking-widest mb-2 text-white">Secondary Node</h3>
                    <p class="text-xs text-gray-400 mb-8 leading-relaxed">Connect to a Hub to merge timelines.</p>

                    <div class="w-full mt-auto space-y-4">
                        <button onclick="startQRScanner()"
                            class="w-full bg-[#3b82f6]/10 border border-[#3b82f6]/30 text-[#3b82f6] py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-[#3b82f6] hover:text-white transition-all shadow-lg">
                            <i class="fas fa-camera mr-2"></i> Scan Hub QR
                        </button>
                        <div class="flex items-center gap-3 opacity-50 py-2">
                            <div class="h-px flex-1 bg-white/20"></div>
                            <span class="text-[9px] text-white uppercase font-black tracking-widest">OR</span>
                            <div class="h-px flex-1 bg-white/20"></div>
                        </div>
                        <div class="flex gap-3">
                            <input type="text" id="manualPeerId" placeholder="Enter Host Key..."
                                class="flex-1 bg-black/50 border border-white/10 rounded-2xl px-4 py-4 text-xs text-white placeholder-gray-600 outline-none focus:border-[#3b82f6] font-bold uppercase tracking-wider text-center">
                            <button onclick="joinNeuralNetwork()"
                                class="bg-[#3b82f6] px-6 rounded-2xl hover:scale-105 transition-all text-white shadow-[0_10px_20px_rgba(59,130,246,0.3)]">
                                <i class="fas fa-link"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div
                class="relative z-10 w-full max-w-5xl bg-[#0a0c12]/80 backdrop-blur-2xl p-6 md:p-12 rounded-[40px] border border-white/10 shadow-[0_20px_60px_rgba(0,0,0,0.5)] flex flex-col items-center">
                <div
                    class="flex flex-col md:flex-row justify-between items-center w-full mb-10 border-b border-white/5 pb-6 gap-4">
                    <div class="text-center md:text-left">
                        <h3
                            class="text-2xl md:text-3xl font-black uppercase tracking-widest text-white flex items-center justify-center md:justify-start gap-4">
                            <i class="fas fa-project-diagram text-[#a855f7]"></i> Network Topology
                        </h3>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-2 font-bold">Device Hierarchy &
                            Memory</p>
                    </div>
                    <button onclick="openTemporalArchive()"
                        class="px-6 py-3 bg-[#a855f7]/10 text-[#a855f7] border border-[#a855f7]/30 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-[#a855f7] hover:text-white transition-all flex items-center gap-2">
                        <i class="fas fa-history"></i> View Timeline
                    </button>

                    <button onclick="disconnectNeuralLink()"
                        class="px-6 py-3 bg-red-500/10 text-red-500 border border-red-500/30 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all flex items-center gap-2">
                        <i class="fas fa-unlink"></i> Sever Link & Forget Key
                    </button>

                    <button onclick="clearTopology()"
                        class="px-6 py-3 bg-pulse/10 text-pulse border border-pulse/30 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-pulse hover:text-white transition-all flex items-center gap-2">
                        <i class="fas fa-trash"></i> Purge Network
                    </button>

                </div>

                <div id="topologyTree" class="w-full relative flex flex-col items-center pt-4">
                </div>
            </div>
        </div>
