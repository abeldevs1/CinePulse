<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search - CinePulse</title>
</head>
<body>
    <div id="view-search" class="page-view hidden p-10 lg:p-24 pt-32 relative">
        <!-- Page Info Button: Recalibrated for zero-overlap -->
        <button onclick="openPageInfo('search')"
            class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
            <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
        </button>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-10 mb-12">
            <h2 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter" id="searchHeader">Discover
            </h2>
            <div class="flex flex-wrap gap-4 items-center">

                <div
                    class="flex overflow-x-auto no-scrollbar gap-3 pb-8 -mx-10 px-10 md:mx-0 md:px-0 md:flex-wrap md:overflow-visible">
                    <div class="flex-shrink-0">
                        <select id="searchYear" onchange="applySearchFilters()"
                            class="appearance-none bg-white/5 border border-white/10 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 focus:border-pulse focus:text-white outline-none transition-all">
                            <option value="">Year</option>
                        </select>
                    </div>
                    <div class="flex-shrink-0">
                        <select id="searchCountry" onchange="applySearchFilters()"
                            class="appearance-none bg-white/5 border border-white/10 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 focus:border-pulse focus:text-white outline-none transition-all max-w-[150px] truncate">
                            <option value="">All Regions</option>
                        </select>
                    </div>

                    <div class="flex-shrink-0">
                        <select id="searchSort" onchange="applySearchFilters()"
                            class="appearance-none bg-white/5 border border-white/10 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 focus:border-pulse focus:text-white outline-none transition-all">
                            <option value="popularity.desc">Popular</option>
                            <option value="vote_average.desc">Top Rated</option>
                            <option value="primary_release_date.desc">Latest</option>

                        </select>

                    </div>
                </div>

                <div id="layoutSelector" class="flex bg-white/5 rounded-xl p-1 border border-white/10 ml-2">
                    <button onclick="setSearchLayout('grid-cols-3')"
                        class="layout-btn px-4 py-2 rounded-lg text-gray-500 hover:text-white transition-all"><i
                            class="fas fa-th-large"></i></button>
                    <button onclick="setSearchLayout('grid-cols-4')"
                        class="layout-btn active px-4 py-2 bg-pulse text-white rounded-lg transition-all shadow-lg shadow-pulse/20"><i
                            class="fas fa-th"></i></button>
                    <button onclick="setSearchLayout('grid-cols-5')"
                        class="layout-btn px-4 py-2 rounded-lg text-gray-500 hover:text-white transition-all"><i
                            class="fas fa-border-all"></i></button>
                    <button onclick="setSearchLayout('list')"
                        class="layout-btn px-4 py-2 rounded-lg text-gray-500 hover:text-white transition-all"><i
                            class="fas fa-list"></i></button>
                    <button onclick="toggleSafeMode()"
                        class="safe-mode-toggle px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white/5 border border-white/10 text-gray-500 hover:text-white flex items-center gap-2"><i
                            class="fas fa-shield-alt"></i> Safe: ON</button>
                </div>

            </div>
        </div>
        <div class="mb-8 space-y-4 w-full">
            <div class="flex flex-wrap md:flex-nowrap gap-2 md:gap-3 items-center w-full" id="discoverTypeFilters">
                <button onclick="toggleDiscoverFilter('type', 'all')" id="dType-all"
                    class="d-type-btn px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest bg-pulse text-white shadow-lg shadow-pulse/20 shrink-0 transition-all">All</button>
                <button onclick="toggleDiscoverFilter('type', 'movie')" id="dType-movie"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Movies</button>
                <button onclick="toggleDiscoverFilter('type', 'tv')" id="dType-tv"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Series</button>
                <button onclick="toggleDiscoverFilter('type', 'anime')" id="dType-anime"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Anime</button>
                <button onclick="toggleDiscoverFilter('type', 'kdrama')" id="dType-kdrama"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">K-Drama</button>
                <button onclick="toggleDiscoverFilter('type', 'turkish')" id="dType-turkish"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Turkish</button>
                <button onclick="toggleDiscoverFilter('type', 'asian')" id="dType-asian"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Asian</button>

                <div class="w-px h-6 bg-white/10 mx-1 shrink-0 hidden md:block"></div>

                <button onclick="toggleGenreVisibility('discoverGenreContainer', this)"
                    class="px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all flex items-center gap-2">
                    <i class="fas fa-tags"></i> Genres
                </button>
                <button onclick="resetDiscoverFilters()"
                    class="px-6 py-2 rounded-full bg-pulse/10 text-pulse border border-pulse/20 text-[10px] font-black uppercase hover:bg-pulse hover:text-white shrink-0 transition-all flex items-center gap-2">
                    <i class="fas fa-undo"></i> Reset
                </button>
            </div>
            <div id="discoverGenreContainer"
                class="hidden flex flex-wrap gap-2 md:gap-3 mt-4 w-full animate-in fade-in duration-300"></div>
        </div>
        <div id="actorProfileBanner" class="hidden mb-12 animate-in fade-in zoom-in duration-300"></div>

        <div id="searchGrid" class="grid grid-cols-2 md:grid-cols-4 gap-8 relative min-h-[400px]"></div>

        <div id="discoverLoadContainer" class="mt-24 flex justify-center hidden">
            <button id="btnDiscoverLoadMore" onclick="loadMoreDiscover()"
                class="bg-white/5 border border-white/10 px-12 py-5 rounded-xl font-black text-[10px] uppercase tracking-widest hover:border-pulse hover:text-white transition-all text-gray-400">
                Load More Discovery <i class="fas fa-chevron-down ml-3"></i>
            </button>
        </div>
    </div>
</body>
</html>
