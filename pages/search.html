<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search - CinePulse</title>
</head>
<body>
    <div id="view-search" class="page-view hidden p-10 lg:p-24 pt-32 relative">
        <!-- Page Info Button: Recalibrated for zero-overlap -->
        <button onclick="openPageInfo('search')"
            class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
            <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
        </button>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-10 mb-12">
            <h2 class="text-5xl md:text-7xl font-black italic uppercase tracking-tighter" id="searchHeader">Discover
            </h2>
            <div class="flex flex-wrap gap-4 items-center relative">

                <div
                    class="hidden md:flex overflow-x-auto no-scrollbar gap-3 pb-8 -mx-10 px-10 md:mx-0 md:px-0 md:flex-wrap md:overflow-visible">
                    <div class="flex-shrink-0">
                        <select id="searchYear" onchange="applySearchFilters()"
                            class="appearance-none bg-white/5 border border-white/10 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 focus:border-pulse focus:text-white outline-none transition-all">
                            <option value="">Year</option>
                        </select>
                    </div>
                    <div class="flex-shrink-0">
                        <select id="searchCountry" onchange="applySearchFilters()"
                            class="appearance-none bg-white/5 border border-white/10 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 focus:border-pulse focus:text-white outline-none transition-all max-w-[150px] truncate">
                            <option value="">All Regions</option>
                        </select>
                    </div>

                    <div class="flex-shrink-0">
                        <select id="searchSort" onchange="applySearchFilters()"
                            class="appearance-none bg-white/5 border border-white/10 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 focus:border-pulse focus:text-white outline-none transition-all">
                            <option value="popularity.desc">Popular</option>
                            <option value="vote_average.desc">Top Rated</option>
                            <option value="primary_release_date.desc">Latest</option>
                        </select>
                    </div>
                </div>

                <!-- Mobile Action Row -->
                <div class="flex md:hidden w-full mt-4">
                    <button onclick="toggleMobileFilters()"
                        class="w-full flex items-center justify-center gap-2 bg-pulse text-white px-5 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-pulse/20 transition-all">
                        <i class="fas fa-filter"></i> Filters
                    </button>
                </div>

                <!-- Desktop Layout Controls -->
                <div class="hidden md:flex items-center gap-2 relative">
                    <div class="relative group/layout">
                        <button onclick="toggleLayoutMenu()" id="layoutToggleBtn"
                            class="flex items-center gap-2 bg-white/5 border border-white/10 px-5 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 hover:text-white transition-all">
                            <i class="fas fa-th-large"></i> Layout
                        </button>
                        
                        <!-- PC Layout Menu: Solid background and stronger border for maximum visibility -->
                        <div id="layoutSelector" class="hidden absolute left-0 top-0 w-full h-full min-w-[340px] bg-[#0a0c12] border-2 border-pulse/50 rounded-2xl p-1 shadow-[0_0_30px_rgba(0,0,0,0.8),0_0_15px_rgba(255,45,85,0.2)] z-[120] gap-1 animate-in fade-in zoom-in duration-200">
                             <button data-layout="grid-cols-3" onclick="setSearchLayout('grid-cols-3')"
                                class="layout-btn flex-1 px-2 py-3 rounded-xl text-gray-500 hover:text-white transition-all flex flex-col items-center justify-center gap-1">
                                <i class="fas fa-th-large text-[10px]"></i>
                                <span class="text-[7px] uppercase font-black">Cozy</span>
                            </button>
                            <button data-layout="grid-cols-4" onclick="setSearchLayout('grid-cols-4')"
                                class="layout-btn flex-1 px-2 py-3 rounded-xl text-gray-500 hover:text-white transition-all flex flex-col items-center justify-center gap-1">
                                <i class="fas fa-th text-[10px]"></i>
                                <span class="text-[7px] uppercase font-black">Std</span>
                            </button>
                            <button data-layout="grid-cols-5" onclick="setSearchLayout('grid-cols-5')"
                                class="layout-btn flex-1 px-2 py-3 rounded-xl text-gray-500 hover:text-white transition-all flex flex-col items-center justify-center gap-1">
                                <i class="fas fa-border-all text-[10px]"></i>
                                <span class="text-[7px] uppercase font-black">Compact</span>
                            </button>
                            <button data-layout="list" onclick="setSearchLayout('list')"
                                class="layout-btn flex-1 px-2 py-3 rounded-xl text-gray-500 hover:text-white transition-all flex flex-col items-center justify-center gap-1">
                                <i class="fas fa-list text-[10px]"></i>
                                <span class="text-[7px] uppercase font-black">List</span>
                            </button>
                        </div>
                    </div>

                    <button onclick="toggleSafeMode()" id="safeModeBtn"
                        class="safe-mode-toggle px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all bg-white/5 border border-white/10 text-gray-500 hover:text-white flex items-center gap-2 shrink-0">
                        <i class="fas fa-shield-alt"></i> Safe: ON
                    </button>
                </div>

            </div>
        </div>
        <div class="mb-8 space-y-4 w-full">
            <div class="hidden md:flex flex-wrap gap-2 md:gap-3 items-center w-full" id="discoverTypeFilters">
                <!-- Mobile only extra row for selects -->
                <div class="flex md:hidden w-full gap-2 mb-4 overflow-x-auto no-scrollbar">
                     <select id="searchYearMobile" onchange="syncSearchSelects('searchYearMobile', 'searchYear')"
                            class="appearance-none bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-gray-400 outline-none">
                            <option value="">Year</option>
                        </select>
                        <select id="searchCountryMobile" onchange="syncSearchSelects('searchCountryMobile', 'searchCountry')"
                            class="appearance-none bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-gray-400 outline-none">
                            <option value="">Region</option>
                        </select>
                        <select id="searchSortMobile" onchange="syncSearchSelects('searchSortMobile', 'searchSort')"
                            class="appearance-none bg-white/5 border border-white/10 px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-gray-400 outline-none">
                             <option value="popularity.desc">Popular</option>
                             <option value="vote_average.desc">Top</option>
                        </select>
                </div>

                <!-- Mobile only Layout Switcher inside the filter menu -->
                <div class="flex md:hidden w-full flex-col gap-2 mb-6">
                    <div class="text-[8px] font-black uppercase text-gray-600 tracking-widest mb-1">Grid Intelligence Mode</div>
                    <div class="flex gap-1">
                         <button onclick="setSearchLayout('grid-cols-3')" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-gray-400 text-[8px] font-black uppercase tracking-widest hover:text-white active:bg-pulse active:text-white transition-all">Cozy</button>
                         <button onclick="setSearchLayout('grid-cols-4')" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-gray-400 text-[8px] font-black uppercase tracking-widest hover:text-white active:bg-pulse active:text-white transition-all">Std</button>
                         <button onclick="setSearchLayout('grid-cols-5')" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-gray-400 text-[8px] font-black uppercase tracking-widest hover:text-white active:bg-pulse active:text-white transition-all">Compact</button>
                         <button onclick="setSearchLayout('list')" class="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-gray-400 text-[8px] font-black uppercase tracking-widest hover:text-white active:bg-pulse active:text-white transition-all">List</button>
                    </div>
                </div>

                <button onclick="toggleDiscoverFilter('type', 'all')" id="dType-all"
                    class="d-type-btn px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest bg-pulse text-white shadow-lg shadow-pulse/20 shrink-0 transition-all">All</button>
                <button onclick="toggleDiscoverFilter('type', 'movie')" id="dType-movie"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Movies</button>
                <button onclick="toggleDiscoverFilter('type', 'tv')" id="dType-tv"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Series</button>
                <button onclick="toggleDiscoverFilter('type', 'anime')" id="dType-anime"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Anime</button>
                <button onclick="toggleDiscoverFilter('type', 'kdrama')" id="dType-kdrama"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">K-Drama</button>
                <button onclick="toggleDiscoverFilter('type', 'turkish')" id="dType-turkish"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Turkish</button>
                <button onclick="toggleDiscoverFilter('type', 'asian')" id="dType-asian"
                    class="d-type-btn px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all">Asian</button>

                <div class="w-px h-6 bg-white/10 mx-1 shrink-0 hidden md:block"></div>

                <button onclick="toggleGenreVisibility('discoverGenreContainer', this)"
                    class="px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase text-gray-500 hover:text-white shrink-0 transition-all flex items-center gap-2">
                    <i class="fas fa-tags"></i> Genres
                </button>
                <button onclick="resetDiscoverFilters()"
                    class="px-6 py-2 rounded-full bg-pulse/10 text-pulse border border-pulse/20 text-[10px] font-black uppercase hover:bg-pulse hover:text-white shrink-0 transition-all flex items-center gap-2">
                    <i class="fas fa-undo"></i> Reset
                </button>
            </div>
            <div id="discoverGenreContainer"
                class="hidden flex flex-wrap gap-2 md:gap-3 mt-4 w-full animate-in fade-in duration-300"></div>
        </div>
        <div id="actorProfileBanner" class="hidden mb-12 animate-in fade-in zoom-in duration-300"></div>

        <div id="searchGrid" class="grid grid-cols-2 md:grid-cols-4 gap-8 relative min-h-[400px]"></div>

        <div id="discoverLoadContainer" class="mt-24 flex justify-center hidden">
            <button id="btnDiscoverLoadMore" onclick="loadMoreDiscover()"
                class="bg-white/5 border border-white/10 px-12 py-5 rounded-xl font-black text-[10px] uppercase tracking-widest hover:border-pulse hover:text-white transition-all text-gray-400">
                Load More Discovery <i class="fas fa-chevron-down ml-3"></i>
            </button>
        </div>
    </div>
</body>
</html>
