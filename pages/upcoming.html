<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'></head><body>
<div id="view-upcoming" class="page-view hidden p-6 lg:p-24 pt-24 lg:pt-32 min-h-screen relative">
            <!-- Page Info Button: Recalibrated for zero-overlap -->
            <button onclick="openPageInfo('upcoming')"
                class="page-info-btn absolute top-24 right-6 md:right-10 lg:right-12 w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:border-pulse transition-all z-40 shadow-xl group">
                <i class="fas fa-question text-sm group-hover:scale-110 transition-transform"></i>
            </button>


                <div class="flex flex-col md:flex-row justify-between items-start md:items-end w-full gap-6 mb-12">
                    <div>
                        <h2
                            class="text-4xl md:text-6xl lg:text-7xl font-black italic uppercase tracking-tighter liquid-glass mb-2">
                            Coming Soon</h2>
                        <p class="text-[10px] text-pulse uppercase tracking-[0.3em] font-bold">Track Unreleased Archives</p>
                    </div>
                    <button onclick="openCalendar()" 
                            class="w-full md:w-auto bg-white/5 border border-white/10 px-8 py-5 rounded-2xl text-white hover:border-pulse hover:bg-pulse/10 transition-all flex items-center justify-center gap-4 text-[10px] font-black uppercase tracking-widest shadow-2xl group">
                        <i class="fas fa-calendar-alt text-pulse group-hover:scale-110 transition-transform"></i>
                        Open Neural Calendar
                    </button>
                </div>

            <div class="relative w-full max-w-4xl mb-12 z-40">
                <div
                    class="bg-white/5 border border-white/10 rounded-2xl flex items-center px-5 py-4 gap-4 focus-within:border-pulse focus-within:bg-white/10 transition-all shadow-xl backdrop-blur-md">
                    <i class="fas fa-search text-white/40"></i>
                    <input type="text" id="upcomingSearchInput" placeholder="Search for future releases to track..."
                        class="bg-transparent border-none outline-none text-white w-full placeholder:text-white/30 text-[10px] font-black uppercase tracking-widest"
                        oninput="handleUpcomingSearch(this.value)">
                    <button id="clearUpcomingSearch" class="hidden text-gray-500 hover:text-white transition-colors"
                        onclick="clearUpcomingSearch()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div id="upcomingEpisodicSection" class="mb-16 hidden animate-in fade-in duration-500">
                <h3
                    class="text-lg md:text-xl font-black italic uppercase text-[#a855f7] tracking-widest mb-6 border-b border-[#a855f7]/20 pb-4 flex items-center gap-3">
                    <i class="fas fa-play-circle"></i> Airing Now
                </h3>
                <div id="upcomingEpisodicGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                </div>
            </div>

            <div id="upcomingRadarSection" class="mb-16 hidden animate-in fade-in duration-500">
                <h3
                    class="text-lg md:text-xl font-black italic uppercase text-pulse tracking-widest mb-6 border-b border-pulse/20 pb-4 flex items-center gap-3">
                    <i class="fas fa-layer-group"></i> My Tracker
                </h3>
                <div id="upcomingRadarGrid"
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                </div>
            </div>

            <div id="upcomingSearchResultsSection" class="mb-16 hidden animate-in fade-in duration-300">
                <h3
                    class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                    <i class="fas fa-search"></i> Search Results
                </h3>
                <div id="upcomingSearchGrid"
                    class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6 relative min-h-[200px]">
                </div>
            </div>

            <div id="upcomingMatrixSection" class="mb-16 animate-in fade-in duration-500">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-white/10 pb-4 gap-4">
                    <h3 class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest flex items-center gap-3">
                        <i class="fas fa-calendar-day text-pulse"></i> Release Matrix
                    </h3>
                    <div class="flex gap-4 w-full md:w-auto">
                        <select id="matrixTimeFilter" class="bg-dark/80 border border-white/10 rounded-lg px-3 py-2 md:py-1.5 text-[10px] text-white font-bold uppercase tracking-widest outline-none focus:border-pulse w-full md:w-auto cursor-pointer" onchange="renderUpcomingMatrix()">
                            <option value="today">Releasing Today</option>
                            <option value="week">This Week</option>
                            <option value="month">This Month</option>
                        </select>
                        <select id="matrixTypeFilter" class="bg-dark/80 border border-white/10 rounded-lg px-3 py-2 md:py-1.5 text-[10px] text-white font-bold uppercase tracking-widest outline-none focus:border-pulse w-full md:w-auto cursor-pointer" onchange="renderUpcomingMatrix()">
                            <option value="all">All Types</option>
                            <option value="movie">Movies</option>
                            <option value="tv">TV Shows</option>
                            <option value="anime">Anime</option>
                            <option value="kdrama">K-Drama</option>
                            <option value="turkish">Turkish</option>
                            <option value="asian">Asian Cinema</option>
                        </select>
                    </div>
                </div>
                <div id="upcomingMatrixGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">
                </div>
            </div>

            <div id="upcomingDefaultContent" class="animate-in fade-in duration-500">
                <div class="mb-20">
                    <h3
                        class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                        <i class="fas fa-fire text-[#f59e0b] shadow-[0_0_15px_rgba(245,158,11,0.4)]"></i> Highly
                        Anticipated Movies
                    </h3>
                    <div id="upcomingRecommendationsGrid"
                        class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>
                </div>

                <div class="mb-20">
                    <h3
                        class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                        <i class="fas fa-tv text-[#a855f7] shadow-[0_0_15px_rgba(168,85,247,0.4)]"></i> Upcoming Series
                    </h3>
                    <div id="upcomingSeriesGrid"
                        class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>
                </div>

                <div class="mb-20">
                    <h3
                        class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                        <i class="fas fa-cat text-[#ff2d55] shadow-[0_0_15px_rgba(255,45,85,0.4)]"></i> Upcoming Anime
                    </h3>
                    <div id="upcomingAnimeGrid"
                        class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-20">
                    <div>
                        <h3
                            class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                            <i class="fas fa-heart text-[#ec4899] shadow-[0_0_15px_rgba(236,72,153,0.4)]"></i> K-Drama
                            Radar
                        </h3>
                        <div id="upcomingKdramaGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6"></div>
                    </div>
                    <div>
                        <h3
                            class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                            <i class="fas fa-moon text-[#3b82f6] shadow-[0_0_15px_rgba(59,130,246,0.4)]"></i> Turkish
                            Wave
                        </h3>
                        <div id="upcomingTurkishGrid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6"></div>
                    </div>
                </div>

                <div class="mb-20">
                    <h3
                        class="text-lg md:text-xl font-black italic uppercase text-white tracking-widest mb-6 border-b border-white/10 pb-4 flex items-center gap-3">
                        <i class="fas fa-calendar-alt text-[#3b82f6]"></i> Releasing Soon
                    </h3>
                    <div id="upcomingMainGrid"
                        class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>
                </div>
            </div>
        </div></body></html>
