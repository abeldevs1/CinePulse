<div id="customShareModal"
        class="fixed inset-0 z-[9999] hidden flex items-center justify-center bg-black/80 backdrop-blur-xl p-4 opacity-0 transition-opacity duration-300">
        <div
            class="relative w-full max-w-sm bg-[#0a0c12] border border-white/10 rounded-[30px] shadow-2xl p-6 md:p-8 transform scale-95 transition-transform duration-300">
            <button onclick="closeCustomShare()"
                class="absolute top-4 right-4 w-8 h-8 bg-white/5 rounded-full flex items-center justify-center text-gray-500 hover:text-white hover:bg-pulse transition-all">
                <i class="fas fa-times"></i>
            </button>

            <div
                class="w-14 h-14 mx-auto bg-pulse/10 rounded-full flex items-center justify-center mb-4 border border-pulse/20 text-pulse text-xl">
                <i class="fas fa-share-nodes"></i>
            </div>

            <h3 id="shareModalTitle" class="text-xl font-black italic uppercase text-white text-center mb-1">Share
                Entity</h3>
            <p id="shareModalDesc"
                class="text-[10px] text-gray-400 uppercase font-bold tracking-widest text-center mb-6">Transmit Neural
                Link</p>

            <div class="bg-dark border border-white/10 rounded-xl p-3 mb-6 flex items-center gap-3">
                <input type="text" id="shareModalLink" readonly
                    class="bg-transparent w-full text-[10px] text-gray-400 outline-none truncate" value="">
                <button onclick="copyCustomShareLink()"
                    class="w-8 h-8 rounded-lg bg-pulse text-white flex items-center justify-center hover:scale-105 transition-all shadow-lg shadow-pulse/30 shrink-0">
                    <i class="fas fa-copy" id="shareCopyIcon"></i>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-3" id="shareSocialButtons">
            </div>
        </div>
    </div>
